version: "1.0"

# -----------------------------------------------------------
# スクリーニング条件
# 全てここで変更可能、Lambda 再デプロイ不要
# -----------------------------------------------------------
screening:
  min_roe: 0.15               # ROE下限（15%）
  min_roe_years: 3            # 5年中何年ROE基準を満たすか（4→3に緩和）
  min_eps_cagr: 0.0           # EPS CAGR下限（連続赤字なし）
  min_cfo_quality: 0.60       # CFO/純利益 5年平均 下限（0.70→0.60に緩和）
  max_debt_to_earnings: 5.0   # (総資産-純資産)/純利益 上限（4.0→5.0に緩和）
  max_margin_decline: -0.03   # 営業利益率 年間変化率の下限（-0.02→-0.03に緩和）
  min_history_years: 3        # 必要最低限のFYデータ年数
  # 基本フィルタ
  max_unit_price_jpy: 100000  # 単元購入額上限（円）
  min_daily_volume: 1000      # 出来高下限（株/日）
  exclude_existing_tickers: true

# -----------------------------------------------------------
# スコアリング重み（定量3軸、合計 1.0）
# -----------------------------------------------------------
scoring:
  weights:
    roe_stability: 0.40       # ROE安定性（平均÷(1+標準偏差)）
    growth_quality: 0.35      # 成長の質（EPS CAGR × CFO品質）
    financial_solidity: 0.25  # 財務盤石さ（負債倍率逆数 × 自己資本比率）
  qualitative_weight: 0.60    # 最終スコアにおける定性スコアの比重
  quantitative_weight: 0.40

# -----------------------------------------------------------
# バリュエーション（安全域）
# -----------------------------------------------------------
valuation:
  margin_of_safety_threshold: 0.25  # 25%以上の割安で「買い候補」
  conservative_per_cap: 20.0        # 許容PER上限（保守的見積もり）

# -----------------------------------------------------------
# 候補生成
# -----------------------------------------------------------
candidates:
  top_n: 10
  monthly_budget_jpy: 100000
  sector_mode: true
  sector_classification: "17"
  per_sector: 2

# -----------------------------------------------------------
# 定性分析
# -----------------------------------------------------------
qualitative:
  edinet_enabled: true
  ir_scraping_enabled: true
  dimensions:
    - moat           # 経済的なお堀（ブランド・価格支配力）
    - circle         # 能力の輪（ビジネスの明確さ・理解可能性）
    - sincerity      # 経営者の誠実さ（正直さ・一貫性）
    - capital_alloc  # 資本配分の合理性（株主目線）
    - enthusiasm     # 成長への熱意（顧客・製品への語り）

# -----------------------------------------------------------
# データソース
# -----------------------------------------------------------
data_sources:
  jquants:
    enabled: true
    plan: "light"
  edinet:
    enabled: true
  fred:
    enabled: false  # Phase2
  edgar:
    enabled: false  # Phase2

# -----------------------------------------------------------
# 対象資産クラス
# -----------------------------------------------------------
asset_classes:
  jp_stock: true
  us_stock: false  # Phase2
  etf: false
  reit: false

# -----------------------------------------------------------
# 通知
# -----------------------------------------------------------
notification:
  slack:
    enabled: true
    mention: ""
  email:
    enabled: true
